<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Gijs Concertlog</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f5f0eb">
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}body{background:#f5f0eb;color:#1a1a2e;font-family:DM Sans,sans-serif;font-size:14px}
nav{background:rgba(245,240,235,.97);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.08);position:sticky;top:0;z-index:100;display:flex;flex-direction:column}
.ns{height:env(safe-area-inset-top);background:rgba(245,240,235,.97)}.ni{display:flex;align-items:center;padding:0 12px;padding-left:max(12px,env(safe-area-inset-left));padding-right:max(12px,env(safe-area-inset-right));overflow-x:auto;width:100%}
.logo{font-family:Bebas Neue,sans-serif;font-size:16px;letter-spacing:1.5px;color:#1a1a2e;padding:12px 0;margin-right:12px;flex-shrink:0}
.ntab{padding:13px 10px;font-size:12px;font-weight:500;color:#6b6560;cursor:pointer;border:none;border-bottom:2px solid transparent;background:none;font-family:DM Sans,sans-serif;white-space:nowrap}.ntab.on{color:#1a1a2e;border-bottom-color:#1a1a2e}
.main{padding:16px;padding-bottom:max(16px,env(safe-area-inset-bottom));max-width:960px;margin:0 auto}
h1{font-family:Bebas Neue,sans-serif;font-size:24px;letter-spacing:1px;margin-bottom:14px}
input,select{background:#e0dad4;border:1px solid rgba(26,26,46,.1);border-radius:8px;padding:9px 12px;color:#1a1a2e;font-family:DM Sans,sans-serif;font-size:13px;width:100%}
input:focus,select:focus{outline:none;border-color:#1a1a2e}input::placeholder{color:#6b6560}select option{background:#f5f0eb}
.sw{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}.si{position:relative}.si input{padding-left:30px}.ic{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:#6b6560;pointer-events:none}
.grid{display:flex;flex-direction:column;gap:10px}.card{background:#ede8e3;border:1px solid rgba(26,26,46,.1);border-radius:14px;padding:14px 16px;cursor:pointer;transition:border-color .2s}.card:hover{border-color:rgba(26,26,46,.25)}
.ctop{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px}.ca{font-family:Bebas Neue,sans-serif;font-size:20px;color:#1a1a2e;line-height:1.1}.cd{background:#e0dad4;border:1px solid rgba(26,26,46,.1);border-radius:6px;padding:3px 8px;font-size:11px;color:#6b6560;white-space:nowrap;flex-shrink:0}
.cm{display:flex;flex-wrap:wrap;gap:6px;align-items:center;font-size:12px;color:#6b6560}.pill{font-size:11px;padding:2px 7px;border-radius:20px;font-weight:500}.ps{background:rgba(26,26,46,.1);color:#1a1a2e}.pf{background:rgba(200,75,49,.1);color:#c84b31}.pl{background:rgba(45,106,79,.1);color:#2d6a4f}
.pag{display:flex;align-items:center;gap:8px;margin-top:14px;justify-content:center}.pi{font-size:12px;color:#6b6560}.btn{padding:5px 10px;border-radius:8px;border:1px solid rgba(255,255,255,.08);font-family:DM Sans,sans-serif;font-size:11px;cursor:pointer;background:#e0dad4;color:#1a1a2e}.btn:disabled{opacity:.4;cursor:not-allowed}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-end;justify-content:center}.md{background:#f5f0eb;border:1px solid rgba(255,255,255,.08);border-radius:20px 20px 0 0;max-width:680px;width:100%;max-height:85vh;display:flex;flex-direction:column}
.mh{padding:20px 20px 14px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0}.mt{font-family:Bebas Neue,sans-serif;font-size:26px;color:#1a1a2e;line-height:1.1}.mm{font-size:12px;color:#6b6560;margin-top:4px;display:flex;flex-wrap:wrap;gap:6px}.mc{background:#e0dad4;border:1px solid rgba(26,26,46,.1);border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:18px;color:#6b6560;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1}
.mb{overflow-y:auto;padding:16px 20px 32px;flex:1}.sli{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.08);font-size:13px}.sli:last-child{border-bottom:none}.sln{font-family:Bebas Neue,sans-serif;font-size:16px;color:#1a1a2e;min-width:28px;text-align:right}.slt{color:#1a1a2e}
.stat{background:#ede8e3;border:1px solid rgba(26,26,46,.1);border-radius:12px;padding:14px}.stl{font-size:10px;color:#6b6560;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}.stv{font-family:Bebas Neue,sans-serif;font-size:28px;color:#1a1a2e;line-height:1}.sts{font-size:10px;color:#6b6560;margin-top:2px}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:18px}.cb{background:#ede8e3;border:1px solid rgba(26,26,46,.1);border-radius:14px;padding:18px;margin-bottom:14px}.cl{font-size:11px;font-weight:500;color:#6b6560;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.br{display:flex;align-items:center;gap:8px;margin-bottom:8px}.bn{font-size:12px;min-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#1a1a2e}.bt{flex:1;height:7px;background:#e0dad4;border-radius:4px;overflow:hidden}.bf{height:100%;background:#1a1a2e;border-radius:4px}.bc{font-size:12px;font-weight:600;color:#1a1a2e;min-width:24px;text-align:right}
.two{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:540px){.two{grid-template-columns:1fr}}.ybars{display:flex;align-items:flex-end;gap:3px;overflow-x:auto;padding:4px 0 2px}.ybar.ystacked{display:flex;flex-direction:column-reverse;overflow:hidden}.yseg{width:100%;flex-shrink:0}.ycol{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:26px;flex:1}.ybar{background:#1a1a2e;border-radius:3px 3px 0 0;width:100%;min-height:2px}.ylbl{font-size:9px;color:#6b6560}.ycnt{font-size:10px;color:#1a1a2e;font-weight:600}
</style></head><body>
<nav><div class="ns"></div><div class="ni">
<div class="logo">Gijs Concertlog</div>
<button class="ntab on" id="tl" onclick="gp(0)">Concerten</button>
<button class="ntab" id="ta" onclick="gp(1)">Analytics</button>
</div></nav>
<div class="main" id="A"><p style="padding:40px;text-align:center;color:#6b6560">Data laden...</p></div>
<script>
var DB=[],pg=0,Q="",FJ="",FS="",FP="",FL="",CP=1,PP=50;
var GID="25fcd0a68131eb5eb2535d7f70135e85",GF="concertlog.json";
function eh(s){return String(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function fm(q,t){if(!q)return true;if(!t)return false;var tl=t.toLowerCase(),ql=q.toLowerCase().trim();if(tl.includes(ql))return true;return ql.split(/\s+/).filter(Boolean).every(function(w){return tl.includes(w);});}
function gp(p){pg=p;var ids=["tl","ta"];ids.forEach(function(id,i){var el=document.getElementById(id);if(el)el.className="ntab"+(i===p?" on":"");});re();}
function re(){var el=document.getElementById("A");el.innerHTML=pg===0?bL():bA();}
function gf(){return DB.filter(function(c){var q=Q.trim(),lq=FL.trim();return(!q||[c.artiest,c.locatie,c.plaats,c.festival,c.soort].some(function(v){return fm(q,v);}))&&(!lq||fm(lq,c.locatie))&&(!FJ||String(c.jaar)===FJ)&&(!FS||c.soort===FS)&&(!FP||c.plaats===FP);}).sort(function(a,b){return b.datum>a.datum?1:-1;});}
function bL(){var jr=[...new Set(DB.map(function(c){return c.jaar;}).filter(Boolean))].sort(function(a,b){return b-a;});var pl=[...new Set(DB.map(function(c){return c.plaats;}).filter(Boolean))].sort();var so=["Hoofdprogramma","Voorprogramma","Festivaloptreden","Theater","Musical","Comedy"];
var h="<div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:14px\"><h1>CONCERTLOG <span style=\"font-size:14px;color:#6b6560\" id=\"tc\"></span></h1></div>";
h+="<div class=\"sw\"><div class=\"si\" style=\"flex:1;min-width:160px\"><span class=\"ic\">&#128269;</span><input id=\"si\" placeholder=\"Zoek artiest, locatie, plaats...\"></div>";
h+="<div class=\"si\" style=\"min-width:100px\"><span class=\"ic\">&#128205;</span><input id=\"li\" placeholder=\"Venue...\"></div>";
h+="<select id=\"js\" style=\"width:auto;min-width:80px\"><option value=\"\">Alle jaren</option>"+jr.map(function(j){return"<option value=\""+j+"\">"+j+"</option>";}).join("")+"</select>";
h+="<select id=\"ss\" style=\"width:auto;min-width:110px\"><option value=\"\">Alle soorten</option>"+so.map(function(s){return"<option value=\""+s+"\">"+s+"</option>";}).join("")+"</select>";
h+="<select id=\"ps\" style=\"width:auto;min-width:100px\"><option value=\"\">Alle plaatsen</option>"+pl.map(function(p){return"<option value=\""+p+"\">"+p+"</option>";}).join("")+"</select></div>";
h+="<div id=\"ri\" style=\"font-size:12px;color:#6b6560;margin-bottom:8px\"></div><div id=\"cg\" class=\"grid\"></div><div id=\"pd\" class=\"pag\"></div>";
setTimeout(function(){var si=document.getElementById("si"),li=document.getElementById("li"),js=document.getElementById("js"),ss=document.getElementById("ss"),ps=document.getElementById("ps");
if(si)si.addEventListener("input",function(){Q=this.value;CP=1;uc();});if(li)li.addEventListener("input",function(){FL=this.value;CP=1;uc();});
if(js)js.addEventListener("change",function(){FJ=this.value;CP=1;uc();});if(ss)ss.addEventListener("change",function(){FS=this.value;CP=1;uc();});if(ps)ps.addEventListener("change",function(){FP=this.value;CP=1;uc();});uc();},0);return h;}
function uc(){var f=gf(),tot=f.length,pages=Math.max(1,Math.ceil(tot/PP));if(CP>pages)CP=pages;var sl=f.slice((CP-1)*PP,CP*PP);var tc=document.getElementById("tc"),ri=document.getElementById("ri"),cg=document.getElementById("cg"),pd=document.getElementById("pd");
if(tc)tc.textContent=tot.toLocaleString("nl")+" concerten";if(ri)ri.textContent=tot+" resultaten \u00b7 pagina "+CP+" van "+pages;
if(cg)cg.innerHTML=tot===0?"<div style=\"text-align:center;padding:48px;color:#6b6560\">Geen resultaten</div>":sl.map(bc).join("");
if(pd)pd.innerHTML=pages>1?"<button class=\"btn\" "+(CP===1?"disabled":"")+" onclick=\"CP=Math.max(1,CP-1);uc()\">&larr;</button> <span class=\"pi\">"+CP+"/"+pages+"</span> <button class=\"btn\" "+(CP===pages?"disabled":"")+" onclick=\"CP=Math.min("+pages+",CP+1);uc()\">&rarr;</button>":"";}
function bc(c){var d=c.datum?new Date(c.datum).toLocaleDateString("nl-NL",{day:"numeric",month:"short",year:"numeric"}):"";var s=c.setlist||[];
return"<div class=\"card\" onclick=\"od('"+c.id+"')\">"+"<div class=\"ctop\"><div class=\"ca\">"+eh(c.artiest)+"</div><div class=\"cd\">"+d+"</div></div>"+"<div class=\"cm\">"+( c.locatie?"&#128205; "+eh(c.locatie)+(c.plaats?", "+eh(c.plaats):" "):c.plaats?"&#128205; "+eh(c.plaats):"")+( c.soort?" <span class=\"pill ps\">"+eh(c.soort)+"</span>":"")+( c.festival?" <span class=\"pill pf\">&#127894; "+eh(c.festival)+"</span>":"")+( s.length?" <span class=\"pill pl\">&#127925; "+s.length+" nrs</span>":"")+"</div></div>";}
function od(id){var c=DB.find(function(x){return x.id===id;});if(!c)return;var d=c.datum?new Date(c.datum).toLocaleDateString("nl-NL",{day:"numeric",month:"long",year:"numeric"}):"";var s=c.setlist||[];
var ov=document.createElement("div");ov.className="mo";ov.id="dm";
ov.innerHTML="<div class=\"md\"><div class=\"mh\"><div style=\"min-width:0\"><div class=\"mt\">"+eh(c.artiest)+"</div><div class=\"mm\">"+eh(d)+(c.locatie?" &middot; &#128205; "+eh(c.locatie)+(c.plaats?", "+eh(c.plaats):""):c.plaats?" &middot; &#128205; "+eh(c.plaats):"")+( c.soort?" <span class=\"pill ps\">"+eh(c.soort)+"</span>":"")+"</div></div><button class=\"mc\" onclick=\"cd()\">&#215;</button></div>"+"<div class=\"mb\">"+( s.length?"<div style=\"font-size:11px;color:#6b6560;text-transform:uppercase;margin-bottom:10px\">Setlist &mdash; "+s.length+" nummers</div>"+s.map(function(t,i){return"<div class=\"sli\"><span class=\"sln\">"+(i+1)+"</span><span class=\"slt\">"+eh(t)+"</span></div>";}).join(""):"<div style=\"padding:30px;text-align:center;color:#6b6560\">Geen setlist</div>")+"</div></div>";
ov.addEventListener("click",function(e){if(e.target===ov)cd();});document.body.appendChild(ov);document.body.style.overflow="hidden";}
function cd(){var m=document.getElementById("dm");if(m){m.remove();document.body.style.overflow="";}}
function bA(){
  if(!DB.length)return"<p style="padding:40px;text-align:center;color:#6b6560">Geen data</p>";
  var tot=DB.length;
  var uA=new Set(DB.map(function(c){return c.artiest;})).size;
  var uP=new Set(DB.map(function(c){return c.plaats;}).filter(Boolean)).size;
  var uL=new Set(DB.map(function(c){return c.locatie;}).filter(Boolean)).size;
  var withSl=DB.filter(function(c){return c.setlist&&c.setlist.length;}).length;
  var yc={};DB.forEach(function(c){if(c.jaar)yc[c.jaar]=(yc[c.jaar]||0)+1;});
  var jArr=DB.map(function(c){return c.jaar;}).filter(Boolean);
  var span=jArr.length?Math.max.apply(null,jArr)-Math.min.apply(null,jArr)+1:0;
  var mc2={};DB.forEach(function(c){var m=c.datum&&c.datum.slice(0,7);if(m)mc2[m]=(mc2[m]||0)+1;});
  var bm2=Object.entries(mc2).sort(function(a,b){return b[1]-a[1];})[0];
  var streak=bm2?bm2[1]:0,streakLbl=bm2?new Date(bm2[0]+"-01").toLocaleDateString("nl-NL",{month:"short",year:"numeric"}):"";
  var rye=Object.entries(yc).sort(function(a,b){return b[1]-a[1];})[0];
  var rJaar=rye?rye[0]:"",rN=rye?rye[1]:0;
  function st(v,l,s){return"<div class="stat"><div class="stl">"+l+"</div><div class="stv">"+v+"</div><div class="sts">"+s+"</div></div>";}
  function bar(e,mx){return e.map(function(x){return"<div class="br"><div class="bn">"+eh(x[0])+"</div><div class="bt"><div class="bf" style="width:"+Math.round(x[1]/mx*100)+"%"></div></div><div class="bc">"+x[1]+"</div></div>";}).join("");}
  var ac={};DB.forEach(function(c){ac[c.artiest]=(ac[c.artiest]||0)+1;});
  var t10=Object.entries(ac).sort(function(a,b){return b[1]-a[1];}).slice(0,10),mA=t10[0]?t10[0][1]:1;
  var pc={};DB.forEach(function(c){if(c.plaats)pc[c.plaats]=(pc[c.plaats]||0)+1;});
  var tP=Object.entries(pc).sort(function(a,b){return b[1]-a[1];}).slice(0,8),mP=tP[0]?tP[0][1]:1;
  var lc={};DB.forEach(function(c){if(c.locatie)lc[c.locatie]=(lc[c.locatie]||0)+1;});
  var tL=Object.entries(lc).sort(function(a,b){return b[1]-a[1];}).slice(0,8),mL=tL[0]?tL[0][1]:1;
  var sc={};DB.forEach(function(c){if(c.soort)sc[c.soort]=(sc[c.soort]||0)+1;});
  var tS=Object.entries(sc).sort(function(a,b){return b[1]-a[1];});
  var SOORTEN=["Hoofdprogramma","Voorprogramma","Festivaloptreden","Theater","Musical","Comedy"];
  var SC={"Hoofdprogramma":"#1a1a2e","Voorprogramma":"#c84b31","Festivaloptreden":"#e5a100","Theater":"#6b3f8a","Musical":"#c06090","Comedy":"#d46a20"};
  var yrs=Object.entries(yc).sort(function(a,b){return+a[0]-+b[0];});
  var maxY=yrs.length?Math.max.apply(null,yrs.map(function(y){return y[1];})):1;
  var yrHtml=yrs.map(function(e){
    var sd={};DB.filter(function(c){return String(c.jaar)===String(e[0]);}).forEach(function(c){var s=c.soort||"Hoofdprogramma";sd[s]=(sd[s]||0)+1;});
    var segs=SOORTEN.map(function(s){var n=sd[s]||0;if(!n)return"";var pct=Math.round(n/e[1]*100);return"<div class="yseg" data-s=""+s+"" style="height:"+pct+"%;background:"+(SC[s]||"#1a1a2e")+"" title=""+s+": "+n+""></div>";}).join("");
    var h=Math.round(e[1]/maxY*90)+6;
    return"<div class="ycol"><div class="ycnt">"+e[1]+"</div><div class="ybar ystacked" style="height:"+h+"px">"+segs+"</div><div class="ylbl">&apos;"+String(e[0]).slice(2)+"</div></div>";
  }).join("");
  var MAANDEN=["Jan","Feb","Mrt","Apr","Mei","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  var maandData={};DB.forEach(function(c){if(c.maand){var s=c.soort||"Hoofdprogramma";if(!maandData[c.maand])maandData[c.maand]={};maandData[c.maand][s]=(maandData[c.maand][s]||0)+1;}});
  var mTotals=[];for(var mi=1;mi<=12;mi++){var mt=Object.values(maandData[mi]||{}).reduce(function(a,b){return a+b;},0);mTotals.push(mt);}
  var maxM=Math.max.apply(null,mTotals)||1;
  var mHtml="";for(var mi2=1;mi2<=12;mi2++){var md=maandData[mi2]||{};var tm=mTotals[mi2-1];var h2=tm?Math.round(tm/maxM*90)+6:4;var segs2=SOORTEN.map(function(s){var n=md[s]||0;if(!n)return"";var pct=tm?Math.round(n/tm*100):0;return"<div class="yseg" style="height:"+pct+"%;background:"+(SC[s]||"#1a1a2e")+"" title=""+s+": "+n+""></div>";}).join("");mHtml+="<div class="ycol"><div class="ycnt">"+(tm||"")+"</div><div class="ybar ystacked" style="height:"+h2+"px">"+(tm?segs2:"")+"</div><div class="ylbl">"+MAANDEN[mi2-1]+"</div></div>";}
  var statsHtml="<div class="sg">"+st(tot.toLocaleString("nl"),"Totaal","concerten")+st(uA,"Artiesten","uniek")+st(uP,"Plaatsen","bezocht")+st(uL,"Locaties","venues")+st(span,"Jaren actief","jaar")+st(streak,"Record maand",streakLbl)+st(rJaar,"Record jaar",rN+" concerten")+st(withSl,"Met setlist","concerten")+"</div>";
  var soortHtml="<div class="sg">"+tS.map(function(e){var pct=Math.round(e[1]/tot*100);return st(e[1],e[0],pct+"% van totaal");}).join("")+"</div>";
  return"<h1>ANALYTICS</h1>"+statsHtml+soortHtml+"<div class="cb"><div class="cl">Top 10 artiesten</div>"+bar(t10,mA)+"</div>"+"<div class="cb"><div class="cl">Concerten per jaar</div><div class="ybars">"+yrHtml+"</div></div>"+"<div class="cb"><div class="cl">Concerten per maand</div><div class="ybars">"+mHtml+"</div></div>"+"<div class="two"><div class="cb"><div class="cl">Top plaatsen</div>"+bar(tP,mP)+"</div><div class="cb"><div class="cl">Top locaties</div>"+bar(tL,mL)+"</div></div>";
}
document.addEventListener("keydown",function(e){if(e.key==="Escape")cd();});
async function init(){
  if(!GID){document.getElementById("A").innerHTML="<p style=\"padding:40px;text-align:center;color:#6b6560\">Geen Gist ID geconfigureerd.</p>";return;}
  try{
    var r=await fetch("https://api.github.com/gists/"+GID,{headers:{"Accept":"application/vnd.github+json"}});
    if(!r.ok)throw new Error("HTTP "+r.status);
    var g=await r.json(),f=g.files&&g.files[GF];
    if(!f)throw new Error("Bestand niet gevonden");
    DB=JSON.parse(f.content);re();
  }catch(e){document.getElementById("A").innerHTML="<p style=\"padding:40px;text-align:center;color:#ff4d6d\">Laden mislukt: "+eh(e.message)+"</p>";}
}
init();
</script>
</body></html>
