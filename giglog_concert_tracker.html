<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Gijs' Concertlog</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Concertlog">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0f">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230a0a0f'/%3E%3Ctext y='.9em' font-size='70' x='10'%3E%26%23x26A1%3B%3C/text%3E%3C/svg%3E">

<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body.theme-dark{--bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a24;--accent:#e8ff47;--accent2:#ff4d6d;--accent3:#47c5ff;--text:#f0ede8;--muted:#777;--border:rgba(255,255,255,0.08);--card:#14141e;--nav-bg:rgba(10,10,15,0.97)}
body.theme-midnight{--bg:#07080f;--bg2:#0d1020;--bg3:#141828;--accent:#a78bfa;--accent2:#f472b6;--accent3:#38bdf8;--text:#e2e8f0;--muted:#64748b;--border:rgba(167,139,250,0.12);--card:#0d1020;--nav-bg:rgba(7,8,15,0.97)}
body.theme-ember{--bg:#0f0a07;--bg2:#1a1008;--bg3:#261808;--accent:#fb923c;--accent2:#f43f5e;--accent3:#fbbf24;--text:#fef3c7;--muted:#78716c;--border:rgba(251,146,60,0.12);--card:#1a1008;--nav-bg:rgba(15,10,7,0.97)}
body.theme-neon{--bg:#020b12;--bg2:#041520;--bg3:#071e2c;--accent:#00f5d4;--accent2:#f706cf;--accent3:#fee440;--text:#e0f7fa;--muted:#4dd0e1;--border:rgba(0,245,212,0.1);--card:#041520;--nav-bg:rgba(2,11,18,0.97)}
body.theme-chalk{--bg:#f5f0eb;--bg2:#ede8e3;--bg3:#e0dad4;--accent:#1a1a2e;--accent2:#c84b31;--accent3:#2d6a4f;--text:#1a1a2e;--muted:#6b6560;--border:rgba(26,26,46,0.12);--card:#ede8e3;--nav-bg:rgba(245,240,235,0.97)}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh;transition:background .3s}
nav{background:var(--nav-bg);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;display:flex;flex-direction:column;overflow-x:auto}
.nav-inner{display:flex;align-items:center;padding:0 12px;padding-left:max(12px,env(safe-area-inset-left));padding-right:max(12px,env(safe-area-inset-right));overflow-x:auto;width:100%}.logo{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1.5px;color:var(--accent);padding:12px 0;margin-right:12px;flex-shrink:0;white-space:nowrap}
.ntab{padding:13px 10px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;border:none;border-bottom:2px solid transparent;background:none;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:color .2s,border-color .2s}
.ntab:hover{color:var(--text)}.ntab.on{color:var(--accent);border-bottom-color:var(--accent)}
.main{padding:16px;padding-bottom:max(16px,env(safe-area-inset-bottom));max-width:960px;margin:0 auto;width:100%}
h1{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px;margin-bottom:14px;color:var(--text)}
.btn{padding:9px 16px;border-radius:8px;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.b-pri{background:var(--accent);color:var(--bg)}.b-pri:hover{filter:brightness(1.1)}
.b-sec{background:var(--bg3);color:var(--text);border:1px solid var(--border)}.b-sec:hover{border-color:var(--accent)}
.b-del{background:rgba(255,77,109,.12);color:var(--accent2);border:1px solid rgba(255,77,109,.2)}.b-del:hover{background:rgba(255,77,109,.22)}
.b-warn{background:rgba(255,77,109,.9);color:#fff;border:none}.b-warn:hover{background:rgba(255,77,109,1)}
.b-sm{padding:5px 10px;font-size:11px}
.btn:disabled{opacity:.4;cursor:not-allowed}
input,select,textarea{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;width:100%;transition:border-color .2s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
input::placeholder,textarea::placeholder{color:var(--muted)}
select option{background:var(--bg2)}
.sw{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.si{position:relative}.si input{padding-left:30px}
.sicon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;font-size:13px}
.grid{display:flex;flex-direction:column;gap:10px}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;transition:border-color .2s}
.card:hover{border-color:rgba(232,255,71,.2)}
.ctop{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px}
.cartist{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.3px;line-height:1.1;color:var(--text)}
.cdate{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-size:11px;color:var(--muted);white-space:nowrap;flex-shrink:0}
.cmeta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;font-size:12px;color:var(--muted)}
.pill{font-size:11px;padding:2px 7px;border-radius:20px;font-weight:500}
.p-soort{background:rgba(71,197,255,.12);color:var(--accent3)}
.p-fest{background:rgba(255,160,50,.12);color:#ffa032}
.p-sl{background:rgba(255,77,109,.12);color:var(--accent2)}
.cpreview{margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.cact{display:flex;gap:6px;margin-top:10px}
.fcard{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:20px}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:560px){.fgrid{grid-column:1fr}}
.fg{display:flex;flex-direction:column;gap:5px}.fg.fw{grid-column:1/-1}
label{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.hint{font-size:11px;color:var(--muted);margin-top:2px}
.divr{height:1px;background:var(--border);margin:14px 0}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.tag{background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:3px 8px;font-size:11px;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif}
.tag:hover{border-color:var(--accent);color:var(--accent)}
.schip{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-size:12px;display:flex;align-items:center;gap:5px}
.snum{color:var(--accent);font-size:10px;font-weight:600;min-width:16px}
.srem{color:var(--muted);cursor:pointer;background:none;border:none;font-size:14px;padding:0;line-height:1;font-family:'DM Sans',sans-serif}
.srem:hover{color:var(--accent2)}
.sgrid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:18px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px}
.stl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.stv{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--accent);line-height:1}
.sts{font-size:10px;color:var(--muted);margin-top:2px}
.cbox{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:14px}
.clbl{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.brow{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bname{font-size:12px;min-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.btrack{flex:1;height:7px;background:var(--bg3);border-radius:4px;overflow:hidden}
.bfill{height:100%;background:var(--accent);border-radius:4px}
.bcnt{font-size:12px;font-weight:600;color:var(--accent);min-width:24px;text-align:right}
.ybars{display:flex;align-items:flex-end;gap:3px;height:90px;overflow-x:auto;padding-bottom:2px}
.ycol{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:26px;flex:1}
.ybar{background:var(--accent);border-radius:3px 3px 0 0;width:100%;min-height:2px}
.ylbl{font-size:9px;color:var(--muted)}.ycnt{font-size:10px;color:var(--accent);font-weight:600}
.two{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:540px){.two{grid-template-columns:1fr}}
.crow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--text)}
.crow:last-child{border-bottom:none}
.dz{background:var(--card);border:2px dashed var(--border);border-radius:14px;padding:28px;text-align:center;cursor:pointer;transition:border-color .2s;margin-bottom:14px}
.dz:hover{border-color:var(--accent)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 18px;font-size:13px;transition:transform .3s;z-index:999;pointer-events:none;white-space:nowrap;color:var(--text)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:var(--accent);color:var(--accent)}
.toast.err{border-color:var(--accent2);color:var(--accent2)}
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.emicon{font-size:36px;margin-bottom:10px}
.emtitle{font-family:'Bebas Neue',sans-serif;font-size:22px;margin-bottom:6px;color:var(--text)}
.pag{display:flex;align-items:center;gap:8px;margin-top:14px;justify-content:center;flex-wrap:wrap}
.pinfo{font-size:12px;color:var(--muted)}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{width:14px;height:14px;border:2px solid transparent;border-top-color:currentColor;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle}
.tswatch{width:36px;height:36px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform .2s;flex-shrink:0}
.tswatch:hover{transform:scale(1.15)}.tswatch.active{border-color:var(--text)}
.paste-area{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;width:100%;min-height:80px;resize:vertical}
.paste-area:focus{outline:none;border-color:var(--accent)}
.paste-area::placeholder{color:var(--muted)}
.info-box{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:14px;font-size:13px;line-height:1.8;color:var(--muted)}
.info-box a{color:var(--accent);text-decoration:none}
.info-box a:hover{text-decoration:underline}
.danger-zone{border:1px solid rgba(255,77,109,.3);border-radius:12px;padding:16px;margin-top:14px}
.danger-title{font-size:11px;font-weight:500;color:var(--accent2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
</style>
</head>

  </div>
</nav>

var DB = [];
var page = 'list';
var editId = null;
var srchQ = '', fJaar = '', fSoort = '', fPlaats = '', fLocatie = '';
var curPage = 1;
var PER = 50;
var FD = resetFD();
var SFKEY = 'MWb35fqHA--C4M7mzbCYrFb9n49Q-UukUyaE';
var CAPI  = 'https://api.anthropic.com/v1/messages';
var curTheme = localStorage.getItem('giglog_theme') || 'dark';

function resetFD() {
  return { artiest:'', locatie:'', plaats:'', datum:'', setlist:[], festival:'', soort:'Hoofdprogramma' };
}

function initDB() {
  try {
    var saved = localStorage.getItem('giglog_v3');
    if (saved) { DB = JSON.parse(saved); return; }
    var bin = atob(RAW_B64);
    var bytes = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    DB = JSON.parse(pako.inflate(bytes, { to: 'string' }));
    persist();
  } catch(e) { console.error('initDB', e); DB = []; }
}

function persist() { localStorage.setItem('giglog_v3', JSON.stringify(DB)); }

function toast(msg, type) {
  var el = document.getElementById('TOAST');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(el._t);
  el._t = setTimeout(function(){ el.className = 'toast'; }, 2800);
}

function escH(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function setTheme(t) {
  curTheme = t;
  document.body.className = 'theme-' + t;
  localStorage.setItem('giglog_theme', t);
  document.querySelectorAll('.tswatch').forEach(function(sw) {
    sw.classList.toggle('active', sw.dataset.theme === t);
  });
}

function goPage(p) {
  page = p;
  if (p !== 'add') editId = null;
  ['list','add','analytics','sync'].forEach(function(id) {
    document.getElementById('tab-' + id).className = 'ntab' + (id === p ? ' on' : '');
  });
  render();
}

function render() {
  var el = document.getElementById('APP');
  if      (page === 'list')      el.innerHTML = buildList();
  else if (page === 'add')       el.innerHTML = buildForm();
  else if (page === 'analytics') el.innerHTML = buildAnalytics();
  else if (page === 'sync')      el.innerHTML = buildSync();
}

/* ── FUZZY SEARCH ─────────────────────────────────────────────── */
function fuzzyMatch(query, target) {
  if (!query) return true;
  if (!target) return false;
  var t = target.toLowerCase();
  var q = query.toLowerCase().trim();
  if (t.includes(q)) return true;
  var tokens = q.split(/\s+/).filter(Boolean);
  return tokens.every(function(tok) { return t.includes(tok); });
}

function getFiltered() {
  return DB.filter(function(c) {
    var q  = srchQ.trim();
    var lq = fLocatie.trim();
    var fields = [c.artiest, c.locatie, c.plaats, c.festival, c.soort];
    var mq = !q  || fields.some(function(v){ return fuzzyMatch(q, v); });
    var ml = !lq || fuzzyMatch(lq, c.locatie);
    var mj = !fJaar   || String(c.jaar) === fJaar;
    var ms = !fSoort  || c.soort === fSoort;
    var mp = !fPlaats || c.plaats === fPlaats;
    return mq && ml && mj && ms && mp;
  }).sort(function(a,b){ return b.datum > a.datum ? 1 : -1; });
}

/* ── LIST ─────────────────────────────────────────────────────── */
function buildList() {
  var jaren    = [...new Set(DB.map(function(c){ return c.jaar; }).filter(Boolean))].sort(function(a,b){ return b-a; });
  var plaatsen = [...new Set(DB.map(function(c){ return c.plaats; }).filter(Boolean))].sort();
  var soorten  = ['Hoofdprogramma','Voorprogramma','Festivaloptreden','Theater','Musical','Comedy'];

  var html = '<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:14px">'
    + '<h1>CONCERTLOG <span style="font-size:14px;color:var(--muted);font-family:\'DM Sans\',sans-serif" id="totalCount"></span></h1>'
    + '<button class="btn b-pri b-sm" onclick="goPage(\'add\')">+ Toevoegen</button></div>'
    + '<div class="sw">'
    + '<div class="si" style="flex:1;min-width:160px"><span class="sicon">🔍</span><input id="searchInput" placeholder="Zoek artiest, locatie, plaats..." value="'+escH(srchQ)+'" autocomplete="off"></div>'
    + '<div class="si" style="min-width:100px"><span class="sicon">📍</span><input id="locInput" placeholder="Venue..." value="'+escH(fLocatie)+'" autocomplete="off"></div>'
    + '<select id="jaarSel" style="width:auto;min-width:80px"><option value="">Alle jaren</option>'
    + jaren.map(function(j){ return '<option value="'+j+'"'+(fJaar===String(j)?' selected':'')+'>'+j+'</option>'; }).join('')+'</select>'
    + '<select id="soortSel" style="width:auto;min-width:110px"><option value="">Alle soorten</option>'
    + soorten.map(function(s){ return '<option value="'+s+'"'+(fSoort===s?' selected':'')+'>'+s+'</option>'; }).join('')+'</select>'
    + '<select id="plaatsSel" style="width:auto;min-width:100px"><option value="">Alle plaatsen</option>'
    + plaatsen.map(function(p){ return '<option value="'+p+'"'+(fPlaats===p?' selected':'')+'>'+p+'</option>'; }).join('')+'</select>'
    + '</div>'
    + '<div id="resultInfo" style="font-size:12px;color:var(--muted);margin-bottom:8px"></div>'
    + '<div id="cardGrid" class="grid"></div>'
    + '<div id="pagDiv" class="pag"></div>';

  setTimeout(function() {
    var si = document.getElementById('searchInput');
    var li = document.getElementById('locInput');
    var js = document.getElementById('jaarSel');
    var ss = document.getElementById('soortSel');
    var ps = document.getElementById('plaatsSel');
    if (si) si.addEventListener('input', function(){ srchQ = this.value; curPage = 1; updateCards(); });
    if (li) li.addEventListener('input', function(){ fLocatie = this.value; curPage = 1; updateCards(); });
    if (js) js.addEventListener('change', function(){ fJaar = this.value; curPage = 1; updateCards(); });
    if (ss) ss.addEventListener('change', function(){ fSoort = this.value; curPage = 1; updateCards(); });
    if (ps) ps.addEventListener('change', function(){ fPlaats = this.value; curPage = 1; updateCards(); });
    updateCards();
  }, 0);

  return html;
}

function updateCards() {
  var filtered = getFiltered();
  var total = filtered.length;
  var pages = Math.max(1, Math.ceil(total / PER));
  if (curPage > pages) curPage = pages;
  var slice = filtered.slice((curPage-1)*PER, curPage*PER);
  var tc = document.getElementById('totalCount');
  var ri = document.getElementById('resultInfo');
  var cg = document.getElementById('cardGrid');
  var pd = document.getElementById('pagDiv');
  if (!cg) return;
  if (tc) tc.textContent = total.toLocaleString('nl') + ' concerten';
  if (ri) ri.textContent = total + ' resultaten · pagina ' + curPage + ' van ' + pages;
  cg.innerHTML = total === 0
    ? '<div class="empty"><div class="emicon">🎸</div><div class="emtitle">Geen resultaten</div></div>'
    : slice.map(buildCard).join('');
  if (pd) pd.innerHTML = pages > 1
    ? '<button class="btn b-sec b-sm" '+(curPage===1?'disabled':'')+' onclick="curPage=Math.max(1,curPage-1);updateCards()">← Vorige</button>'
      + '<span class="pinfo">'+curPage+' / '+pages+'</span>'
      + '<button class="btn b-sec b-sm" '+(curPage===pages?'disabled':'')+' onclick="curPage=Math.min('+pages+',curPage+1);updateCards()">Volgende →</button>'
    : '';
}

function buildCard(c) {
  var d = c.datum ? new Date(c.datum).toLocaleDateString('nl-NL',{day:'numeric',month:'short',year:'numeric'}) : '';
  var songs = c.setlist || [];
  var prev = songs.slice(0,8).join(' · ') + (songs.length > 8 ? ' · +' + (songs.length-8) + ' meer' : '');
  return '<div class="card">'
    + '<div class="ctop"><div class="cartist">'+escH(c.artiest)+'</div><div class="cdate">'+d+'</div></div>'
    + '<div class="cmeta">'
    + (c.locatie ? '<span>📍 '+escH(c.locatie)+(c.plaats?', '+escH(c.plaats):'')+'</span>' : (c.plaats?'<span>📍 '+escH(c.plaats)+'</span>':''))
    + (c.soort ? ' <span class="pill p-soort">'+escH(c.soort)+'</span>' : '')

function setFest(f) { FD.festival = f; var el=document.getElementById('fF'); if(el) el.value=f; }

var _aiTimer = null;
function scheduleAI(v) { clearTimeout(_aiTimer); if(v.length<4)return; _aiTimer=setTimeout(function(){ callAI(v); },900); }

async function callAI(venue) {
  var hint=document.getElementById('aiHint'); var pEl=document.getElementById('fP');
  if(!pEl||pEl.value.trim())return;
  if(hint)hint.textContent='🤖 AI zoekt locatie...';
  try {
    var r=await fetch(CAPI,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:80,
        messages:[{role:'user',content:'Venue: "'+venue+'". Reply ONLY JSON: {"plaats":"Amsterdam"}. Dutch city name. Unknown: {"plaats":""}.' }]})});
    var d=await r.json(); var txt=(d.content&&d.content[0]&&d.content[0].text)||'';
    var m=txt.match(/\{[^}]+\}/);
    if(m){var loc=JSON.parse(m[0]); if(loc.plaats&&pEl&&!pEl.value.trim()){pEl.value=loc.plaats;if(hint)hint.textContent='✅ AI: '+loc.plaats;setTimeout(function(){if(hint)hint.textContent='';},3000);}}
  }catch(e){if(hint)hint.textContent='';}
}

async function fetchSetlist() {
  var aEl=document.getElementById('fA'); var datEl=document.getElementById('fDat');
  var artist=aEl?aEl.value.trim():FD.artiest; var datum=datEl?datEl.value.trim():FD.datum;
  if(!artist){toast('Vul eerst een artiest in','err');return;}
  var btn=document.getElementById('sfBtn'); var st=document.getElementById('sfSt');
  if(btn)btn.disabled=true; if(st)st.innerHTML='<span class="spin"></span> Ophalen...';
  try {
    var tryFetch=async function(useDate){
      var params='artistName='+encodeURIComponent(artist)+'&p=1';
      if(useDate&&datum){var pts=datum.split('-');if(pts.length===3)params+='&date='+pts[2]+'-'+pts[1]+'-'+pts[0];}
      // Setlist.fm blocks CORS, so we route through a CORS proxy
      var apiUrl='https://api.setlist.fm/rest/1.0/search/setlists?'+params;
      var proxyUrl='https://api.allorigins.win/get?url='+encodeURIComponent(apiUrl);
      var r=await fetch(proxyUrl,{headers:{'x-api-key':SFKEY}});
      if(!r.ok)throw new Error('Proxy HTTP '+r.status);
      var wrapper=await r.json();
      if(!wrapper.contents)throw new Error('Lege proxy respons');
      return JSON.parse(wrapper.contents);
    };
    var data=await tryFetch(true); var sl=data.setlist&&data.setlist[0];
    if(!sl&&datum){if(st)st.innerHTML='<span class="spin"></span> Zoekt zonder datum...';data=await tryFetch(false);sl=data.setlist&&data.setlist[0];}
    if(!sl){if(st)st.innerHTML='';toast('Geen setlist gevonden','err');if(btn)btn.disabled=false;return;}
    var songs=[];
    if(sl.sets&&sl.sets.set)sl.sets.set.forEach(function(s){if(s.song)s.song.forEach(function(sg){if(sg.name)songs.push(sg.name);});});
    FD.setlist=songs;
    var lEl=document.getElementById('fL'); var pEl=document.getElementById('fP');
    if(lEl&&!lEl.value&&sl.venue&&sl.venue.name)lEl.value=sl.venue.name;
    if(pEl&&!pEl.value&&sl.venue&&sl.venue.city&&sl.venue.city.name)pEl.value=sl.venue.city.name;
    syncFDFromForm(); if(st)st.textContent='✅ '+songs.length+' nummers!';
    document.getElementById('APP').innerHTML=buildForm(); toast('Setlist: '+songs.length+' nrs','ok');
  }catch(e){if(st)st.textContent='Fout: '+e.message;toast('Setlist mislukt','err');}
  var btn2=document.getElementById('sfBtn'); if(btn2)btn2.disabled=false;
}

function addSong(){var el=document.getElementById('newSong');if(el&&el.value.trim()){syncFDFromForm();FD.setlist.push(el.value.trim());el.value='';refreshSongArea();}}
function rmSong(i){syncFDFromForm();FD.setlist.splice(i,1);refreshSongArea();}

function parseAndAddPaste(){
  var ta=document.getElementById('pasteArea'); if(!ta||!ta.value.trim()){toast('Geen tekst','err');return;}
  syncFDFromForm();
  var added=0;
  ta.value.split('\n').forEach(function(line){
    line=line.trim(); if(!line||line==='--------------------')return;
    var cleaned=line.replace(/^[\d]+[\s]*[\.\-\)]\s*/,'').trim();
    if(cleaned){FD.setlist.push(cleaned);added++;}
  });
  ta.value=''; refreshSongArea(); toast(added+' nummers toegevoegd!','ok');
}

function refreshSongArea(){
  var songs=FD.setlist;
  var newHtml=songs.length?'<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px">'
    +songs.map(function(s,i){return '<div class="schip"><span class="snum">'+(i+1)+'</span><span>'+escH(s)+'</span>'
      +'<button class="srem" onclick="rmSong('+i+')">×</button></div>';}).join('')+'</div>':'';
  var sfSt=document.getElementById('sfSt');
  if(sfSt){var old=sfSt.nextSibling;while(old&&old.nodeType===1&&old.style&&old.style.display==='flex'&&old.querySelector('.schip')){var nxt=old.nextSibling;old.remove();old=nxt;}}
  var existing=document.querySelector('[style*="flex-wrap:wrap"][style*="gap:6px"]');
  if(existing)existing.outerHTML=newHtml;
  else if(sfSt)sfSt.insertAdjacentHTML('afterend',newHtml);
}

function syncFDFromForm(){
  var get=function(id){var el=document.getElementById(id);return el?el.value:'';};
  FD.artiest=get('fA');FD.datum=get('fDat');FD.locatie=get('fL');FD.plaats=get('fP');FD.soort=get('fSo');FD.festival=get('fF');
}

function saveConcert(){
  syncFDFromForm();
  if(!FD.artiest||!FD.datum){toast('Artiest en datum zijn verplicht','err');return;}
  var jaar=FD.datum?parseInt(FD.datum.slice(0,4)):0;
  var maand=FD.datum?parseInt(FD.datum.slice(5,7)):0;
  var entry={id:editId||String(Date.now()),artiest:FD.artiest,datum:FD.datum,locatie:FD.locatie,
    plaats:FD.plaats,setlist:FD.setlist.slice(),festival:FD.festival,soort:FD.soort,maand:maand,jaar:jaar};
  if(editId){DB=DB.map(function(c){return c.id===editId?entry:c;});toast('Opgeslagen! 💾','ok');}
  else{DB.push(entry);toast('Concert toegevoegd! 🎸','ok');}
  editId=null;FD=resetFD();persist();goPage('list');
}

/* ── ANALYTICS ────────────────────────────────────────────────── */
function buildAnalytics(){
  if(!DB.length)return'<div class="empty"><div class="emicon">📊</div><div class="emtitle">Geen data</div></div>';
  var total=DB.length;
  var uArt=new Set(DB.map(function(c){return c.artiest;})).size;
  var uPl=new Set(DB.map(function(c){return c.plaats;}).filter(Boolean)).size;
  var loyalty=(total/uArt).toFixed(1);
  var diversity=Math.round(uArt/total*100);
  var withSl=DB.filter(function(c){return c.setlist&&c.setlist.length;}).length;
  var ac={};DB.forEach(function(c){ac[c.artiest]=(ac[c.artiest]||0)+1;});
  var top10=Object.entries(ac).sort(function(a,b){return b[1]-a[1];}).slice(0,10);
  var maxA=top10[0]?top10[0][1]:1;
  var yc={};DB.forEach(function(c){if(c.jaar)yc[c.jaar]=(yc[c.jaar]||0)+1;});
  var yrs=Object.entries(yc).sort(function(a,b){return+a[0]-+b[0];});
  var maxY=yrs.length?Math.max.apply(null,yrs.map(function(y){return y[1];})):1;
  var pc={};DB.forEach(function(c){if(c.plaats)pc[c.plaats]=(pc[c.plaats]||0)+1;});
  var topP=Object.entries(pc).sort(function(a,b){return b[1]-a[1];}).slice(0,8);
  var maxP=topP[0]?topP[0][1]:1;
  var lc={};DB.forEach(function(c){if(c.locatie)lc[c.locatie]=(lc[c.locatie]||0)+1;});
  var topL=Object.entries(lc).sort(function(a,b){return b[1]-a[1];}).slice(0,8);
  var maxL=topL[0]?topL[0][1]:1;
  var sc={};DB.forEach(function(c){if(c.soort)sc[c.soort]=(sc[c.soort]||0)+1;});
  var topS=Object.entries(sc).sort(function(a,b){return b[1]-a[1];});
  var mc={};DB.forEach(function(c){var m=c.datum&&c.datum.slice(0,7);if(m)mc[m]=(mc[m]||0)+1;});
  var bm=Object.entries(mc).sort(function(a,b){return b[1]-a[1];})[0];
  var streak=bm?bm[1]:0;
  var streakLbl=bm?new Date(bm[0]+'-01').toLocaleDateString('nl-NL',{month:'short',year:'numeric'}):'';
  var jarArr=DB.map(function(c){return c.jaar;}).filter(Boolean);
  var span=jarArr.length?Math.max.apply(null,jarArr)-Math.min.apply(null,jarArr)+1:0;

  function bar(entries,maxVal){return entries.map(function(e){return'<div class="brow"><div class="bname">'+escH(e[0])+'</div><div class="btrack"><div class="bfill" style="width:'+Math.round(e[1]/maxVal*100)+'%"></div></div><div class="bcnt">'+e[1]+'</div></div>';}).join('');}

  return '<h1>ANALYTICS</h1>'
    +'<div class="sgrid2">'
    +statEl(total.toLocaleString('nl'),'Totaal','concerten')
    +statEl(uArt,'Artiesten','uniek')
    +statEl(uPl,'Plaatsen','bezocht')
    +statEl(loyalty+'×','Loyalty','gem. per artiest')
    +statEl(diversity+'%','Diversity','unieke artiesten')
    +statEl(streak,'Record maand',streakLbl)
    +statEl(span,'Jaren actief','jaar bijgehouden')
    +statEl(withSl,'Met setlist','concerten')
    +'</div>'
    +'<div class="cbox"><div class="clbl">🎤 Top 10 artiesten</div>'+bar(top10,maxA)+'</div>'
    +'<div class="cbox"><div class="clbl">📅 Concerten per jaar</div><div class="ybars">'
    +yrs.map(function(e){var h=Math.round(e[1]/maxY*72)+4;return'<div class="ycol"><div class="ycnt">'+e[1]+'</div><div class="ybar" style="height:'+h+'px"></div><div class="ylbl">\''+String(e[0]).slice(2)+'</div></div>';}).join('')
    +'</div></div>'
    +'<div class="two">'
    +'<div class="cbox"><div class="clbl">📍 Top plaatsen</div>'+bar(topP,maxP)+'</div>'
    +'<div class="cbox"><div class="clbl">🏛️ Top locaties</div>'+bar(topL,maxL)+'</div>'
    +'</div>'
    +'<div class="cbox"><div class="clbl">🎪 Soort optreden</div><div style="display:flex;flex-wrap:wrap;gap:10px">'
    +topS.map(function(e){return'<div style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 14px;display:flex;align-items:center;gap:8px"><span style="font-size:12px;color:var(--text)">'+escH(e[0])+'</span><span style="font-family:\'Bebas Neue\',sans-serif;font-size:20px;color:var(--accent)">'+e[1]+'</span></div>';}).join('')
    +'</div></div>';
}

function statEl(v,lbl,sub){return'<div class="stat"><div class="stl">'+lbl+'</div><div class="stv">'+v+'</div><div class="sts">'+sub+'</div></div>';}

function doExportXL(){
  if(!DB.length){toast('Geen data','err');return;}
  var rows=DB.map(function(c){return{'Artiest':c.artiest,'Locatie':c.locatie,'Plaats':c.plaats,'Datum':c.datum,'Setlist':(c.setlist||[]).join('\n'),'Festival/andere bijz.':c.festival,'Soort optreden':c.soort,'Maand':c.maand,'Jaar':c.jaar};});
  var ws=XLSX.utils.json_to_sheet(rows); var wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Concerten');
  XLSX.writeFile(wb,'concertlog_'+new Date().toISOString().slice(0,10)+'.xlsx');
  toast('Excel gedownload!','ok');
}

function doExportCSV(){
  if(!DB.length){toast('Geen data','err');return;}
  var hdr=['Artiest','Locatie','Plaats','Datum','Setlist','Festival/andere bijz.','Soort optreden','Maand','Jaar'];
  var rows=DB.map(function(c){return[c.artiest,c.locatie,c.plaats,c.datum,(c.setlist||[]).join(' | '),c.festival,c.soort,c.maand,c.jaar].map(function(v){return'"'+String(v||'').replace(/"/g,'""')+'"';});});
  var csv=[hdr.join(',')].concat(rows.map(function(r){return r.join(',');})).join('\n');
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download='concertlog_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();toast('CSV gedownload!','ok');
}

function doImport(input){
  var file=input.files[0];if(!file)return;
  var r=new FileReader();
  r.onload=function(e){
    try{
      var wb=XLSX.read(e.target.result,{type:'array'});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var data=XLSX.utils.sheet_to_json(ws,{defval:''});
      var added=0;
      data.forEach(function(row){
        var art=row['Artiest']||row['artiest']||row['Artist']||'';if(!art)return;
        var d=row['Datum ']||row['Datum']||row['datum']||row['Date']||'';var ds='';
        if(d){var dt=new Date(d);if(!isNaN(dt))ds=dt.toISOString().slice(0,10);else ds=String(d).slice(0,10);}
        var sl=row['Setlist']||row['setlist']||'';
        var songs=sl?String(sl).split(/[\n|]/).map(function(s){return s.trim();}).filter(Boolean):[];
        DB.push({id:String(Date.now()+Math.random()),artiest:String(art),
          locatie:String(row['Locatie']||row['locatie']||''),
          plaats:String(row['Plaats']||row['plaats']||row['City']||''),
          datum:ds,setlist:songs,
          festival:String(row['Festival/andere bijz.']||row['festival']||''),
          soort:String(row['Soort optreden']||row['soort']||'Hoofdprogramma'),
          maand:ds?parseInt(ds.slice(5,7)):0,jaar:ds?parseInt(ds.slice(0,4)):0});
        added++;
      });
      persist();toast(added+' concerten geïmporteerd!','ok');goPage('list');
    }catch(err){toast('Import fout: '+err.message,'err');}
  };
  r.readAsArrayBuffer(file);
}

document.body.className='theme-'+curTheme;
initDB();
render();
</script>
</body>
</html>
