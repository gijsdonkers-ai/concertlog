<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Gijs' Concertlog</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Concertlog">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0f">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230a0a0f'/%3E%3Ctext y='.9em' font-size='70' x='10'%3E%26%23x26A1%3B%3C/text%3E%3C/svg%3E">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body.theme-dark{--bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a24;--accent:#e8ff47;--accent2:#ff4d6d;--accent3:#47c5ff;--text:#f0ede8;--muted:#777;--border:rgba(255,255,255,0.08);--card:#14141e;--nav-bg:rgba(10,10,15,0.97)}


body.theme-chalk{--bg:#f5f0eb;--bg2:#ede8e3;--bg3:#e0dad4;--accent:#1a1a2e;--accent2:#c84b31;--accent3:#2d6a4f;--text:#1a1a2e;--muted:#6b6560;--border:rgba(26,26,46,0.12);--card:#ede8e3;--nav-bg:rgba(245,240,235,0.97)}

body.theme-arctic{--bg:#f0f6fc;--bg2:#e8f0f8;--bg3:#dde8f4;--accent:#0d2240;--accent2:#0099cc;--accent3:#c84b31;--text:#0d1b2a;--muted:#5a7a94;--border:rgba(13,34,64,0.14);--card:#e8f0f8;--nav-bg:rgba(240,246,252,0.97)}
body.theme-ys-dark{--bg:#0f1e25;--bg2:#1a313b;--bg3:#233d49;--accent:#FDC300;--accent2:#ff6b35;--accent3:#E5A100;--text:#f0ece2;--muted:#748595;--border:rgba(253,195,0,0.15);--card:#1a313b;--nav-bg:rgba(15,30,37,0.97)}
body.theme-ys-night{--bg:#080f12;--bg2:#111e24;--bg3:#182830;--accent:#FDC300;--accent2:#d49600;--accent3:#f0ece2;--text:#e8e4d8;--muted:#748595;--border:rgba(253,195,0,0.12);--card:#111e24;--nav-bg:rgba(8,15,18,0.97)}
body.theme-ys-petrol{--bg:#1a2830;--bg2:#233240;--bg3:#2d3e4e;--accent:#FDC300;--accent2:#E5A100;--accent3:#96b8c8;--text:#ddeaf0;--muted:#748595;--border:rgba(253,195,0,0.14);--card:#233240;--nav-bg:rgba(26,40,48,0.97)}
body.theme-ys-slate{--bg:#1e2c38;--bg2:#273848;--bg3:#374e5c;--accent:#FDC300;--accent2:#E5A100;--accent3:#a8bfcc;--text:#e4eef4;--muted:#8fa4b4;--border:rgba(253,195,0,0.13);--card:#273848;--nav-bg:rgba(30,44,56,0.97)}
body.theme-ys-light{--bg:#f7f4ee;--bg2:#eeeae0;--bg3:#e3ddd0;--accent:#1a313b;--accent2:#d49600;--accent3:#374e5c;--text:#1a313b;--muted:#748595;--border:rgba(26,49,59,0.14);--card:#eeeae0;--nav-bg:rgba(247,244,238,0.97)}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh;transition:background .3s}
nav{background:var(--nav-bg);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;display:flex;flex-direction:column}
.nav-safe{height:env(safe-area-inset-top);background:var(--nav-bg)}
.nav-inner{display:flex;align-items:center;padding:0 12px;padding-left:max(12px,env(safe-area-inset-left));padding-right:max(12px,env(safe-area-inset-right));overflow-x:auto;width:100%}
.logo{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1.5px;color:var(--accent);padding:12px 0;margin-right:12px;flex-shrink:0;white-space:nowrap}
.ntab{padding:13px 10px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;border:none;border-bottom:2px solid transparent;background:none;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:color .2s,border-color .2s}
.ntab:hover{color:var(--text)}.ntab.on{color:var(--accent);border-bottom-color:var(--accent)}
.main{padding:16px;padding-bottom:max(16px,env(safe-area-inset-bottom));max-width:960px;margin:0 auto;width:100%}
h1{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px;margin-bottom:14px;color:var(--text)}
.btn{padding:9px 16px;border-radius:8px;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.b-pri{background:var(--accent);color:var(--bg)}.b-pri:hover{filter:brightness(1.1)}
.b-sec{background:var(--bg3);color:var(--text);border:1px solid var(--border)}.b-sec:hover{border-color:var(--accent)}
.b-del{background:rgba(255,77,109,.12);color:var(--accent2);border:1px solid rgba(255,77,109,.2)}.b-del:hover{background:rgba(255,77,109,.22)}
.b-warn{background:rgba(255,77,109,.9);color:#fff}.b-warn:hover{background:var(--accent2)}
.b-gist{background:rgba(71,197,255,.12);color:var(--accent3);border:1px solid rgba(71,197,255,.2)}.b-gist:hover{background:rgba(71,197,255,.22)}
.b-sm{padding:5px 10px;font-size:11px}
.btn:disabled{opacity:.4;cursor:not-allowed}
input,select,textarea{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;width:100%;transition:border-color .2s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
input::placeholder,textarea::placeholder{color:var(--muted)}
select option{background:var(--bg2)}
.sw{display:flex;gap:6px;margin-bottom:12px;align-items:center;flex-wrap:wrap}
.sw select{padding:9px 6px;font-size:13px}
@media(min-width:640px){.sw{flex-wrap:nowrap}}
@media(max-width:639px){.sw .si{flex:1 1 45%}.sw select{flex:1 1 auto}}
.si{position:relative}.si input{padding-left:30px}
.sicon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;font-size:13px}
.grid{display:flex;flex-direction:column;gap:10px}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;transition:border-color .2s;cursor:pointer}
.card:hover{border-color:rgba(232,255,71,.25)}
.ctop{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px}
.cartist{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.3px;line-height:1.1;color:var(--text)}
.cdate{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-size:11px;color:var(--muted);white-space:nowrap;flex-shrink:0}
.cmeta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;font-size:12px;color:var(--muted)}
.pill{font-size:11px;padding:2px 7px;border-radius:20px;font-weight:500}
.p-soort{background:rgba(71,197,255,.12);color:var(--accent3)}
.p-fest{background:rgba(255,160,50,.12);color:#ffa032}
.p-sl{background:rgba(255,77,109,.12);color:var(--accent2)}
.fcard{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:20px}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:560px){.fgrid{grid-template-columns:1fr}}
.fg{display:flex;flex-direction:column;gap:5px}
label{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.hint{font-size:11px;color:var(--muted);margin-top:2px}
.divr{height:1px;background:var(--border);margin:14px 0}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.tag{background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:3px 8px;font-size:11px;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif}
.tag:hover{border-color:var(--accent);color:var(--accent)}
.schip{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-size:12px;display:flex;align-items:center;gap:5px}
.snum{color:var(--accent);font-size:10px;font-weight:600;min-width:16px}
.srem{color:var(--muted);cursor:pointer;background:none;border:none;font-size:14px;padding:0;line-height:1;font-family:'DM Sans',sans-serif}
.srem:hover{color:var(--accent2)}
.sgrid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:18px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px}@media(max-width:600px){.stat{padding:10px;border-radius:10px}}
.stl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.stv{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--accent);line-height:1}@media(max-width:600px){.stv{font-size:22px}}
.sts{font-size:10px;color:var(--muted);margin-top:2px}
.cbox{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:14px}
.clbl{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.brow{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bname{font-size:12px;min-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.btrack{flex:1;height:7px;background:var(--bg3);border-radius:4px;overflow:hidden}
.bfill{height:100%;background:var(--accent);border-radius:4px}
.bcnt{font-size:12px;font-weight:600;color:var(--accent);min-width:24px;text-align:right}
.ybars{display:flex;align-items:flex-end;gap:3px;overflow-x:auto;padding:4px 0 2px}
.ycol{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:28px;flex:1}
.ybar{border-radius:3px 3px 0 0;width:100%;min-height:3px;transition:height .25s ease}
.ylbl{font-size:9px;color:var(--muted);margin-top:1px}
.ycnt{font-size:10px;color:var(--accent);font-weight:600;white-space:nowrap}
.two{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:540px){.two{grid-template-columns:1fr}}
.dz{background:var(--card);border:2px dashed var(--border);border-radius:14px;padding:28px;text-align:center;cursor:pointer;transition:border-color .2s;margin-bottom:14px}
.dz:hover{border-color:var(--accent)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 18px;font-size:13px;transition:transform .3s;z-index:999;pointer-events:none;white-space:nowrap;color:var(--text)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:var(--accent);color:var(--accent)}
.toast.err{border-color:var(--accent2);color:var(--accent2)}
.toast.info{border-color:var(--accent3);color:var(--accent3)}
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.emtitle{font-family:'Bebas Neue',sans-serif;font-size:22px;margin-bottom:6px;color:var(--text)}
.pag{display:flex;align-items:center;gap:8px;margin-top:14px;justify-content:center;flex-wrap:wrap}
.pinfo{font-size:12px;color:var(--muted)}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{width:14px;height:14px;border:2px solid transparent;border-top-color:currentColor;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle}
.tswatch{width:36px;height:36px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform .2s;flex-shrink:0}
.tswatch:hover{transform:scale(1.15)}.tswatch.active{border-color:var(--text)}
.paste-area{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;width:100%;min-height:80px;resize:vertical}
.paste-area:focus{outline:none;border-color:var(--accent)}
.paste-area::placeholder{color:var(--muted)}
.danger-zone{border:1px solid rgba(255,77,109,.3);border-radius:12px;padding:16px;margin-top:14px}
.danger-title{font-size:11px;font-weight:500;color:var(--accent2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.sync-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500;border:1px solid var(--border);background:var(--bg3);color:var(--muted)}
.sync-ok{background:rgba(71,197,255,.12);color:var(--accent3);border-color:rgba(71,197,255,.2)}
.sync-err{background:rgba(255,77,109,.12);color:var(--accent2);border-color:rgba(255,77,109,.2)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:20px 20px 0 0;max-width:680px;width:100%;max-height:85vh;display:flex;flex-direction:column;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{padding:20px 20px 14px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:.5px;color:var(--text);line-height:1.1}
.modal-meta{font-size:12px;color:var(--muted);margin-top:4px;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.modal-close{background:var(--bg3);border:1px solid var(--border);border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:18px;color:var(--muted);display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1}
.modal-close:hover{color:var(--text);border-color:var(--accent)}
.modal-body{overflow-y:auto;padding:16px 20px 32px;flex:1}
.modal-actions{display:flex;gap:8px;padding:12px 20px;border-top:1px solid var(--border);flex-shrink:0}
.setlist-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
.setlist-item:last-child{border-bottom:none}
.setlist-num{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--accent);min-width:28px;text-align:right}
.setlist-name{color:var(--text)}

.ybtn{padding:3px 9px;border-radius:12px;border:1px solid var(--border);background:transparent;font-size:10px;cursor:pointer;font-family:DM Sans,sans-serif;color:var(--muted);transition:all .15s;white-space:nowrap}
.ybtn.ybtn-on{background:var(--accent);color:var(--bg);border-color:var(--accent);font-weight:500}
.ybtn:hover{border-color:var(--accent)}
.ybar.ystacked{display:flex;flex-direction:column-reverse;overflow:hidden}
.yseg{width:100%;flex-shrink:0}
.chat-box{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-top:14px;display:flex;flex-direction:column;overflow:hidden}
.chat-msgs{padding:16px;display:flex;flex-direction:column;gap:10px;max-height:380px;overflow-y:auto}
.chat-msg{display:flex;gap:8px;align-items:flex-start}
.chat-msg.user{flex-direction:row-reverse}
.chat-bubble{padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.6;max-width:85%}
.chat-msg.bot .chat-bubble{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:4px 14px 14px 14px}
.chat-msg.user .chat-bubble{background:var(--accent);color:var(--bg);border-radius:14px 4px 14px 14px}
.chat-msg.thinking .chat-bubble{color:var(--muted)}
.chat-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-top:2px}
.chat-bot-avatar{background:var(--bg3);border:1px solid var(--border)}
.chat-user-avatar{background:var(--accent);color:var(--bg)}
.chat-input-row{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--border)}
.chat-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:22px;padding:9px 16px;color:var(--text);font-family:DM Sans,sans-serif;font-size:13px;resize:none}
.chat-input:focus{outline:none;border-color:var(--accent)}
.chat-send{width:38px;height:38px;border-radius:50%;border:none;background:var(--accent);color:var(--bg);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:filter .15s}
.chat-send:hover{filter:brightness(1.1)}.chat-send:disabled{opacity:.4;cursor:not-allowed}
.chat-suggestions{display:flex;flex-wrap:wrap;gap:6px;padding:0 16px 12px}
.chat-sug{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:11px;color:var(--muted);cursor:pointer;font-family:DM Sans,sans-serif;transition:all .15s}
.chat-sug:hover{border-color:var(--accent);color:var(--accent)}
#factDisplay{transition:opacity .15s;min-height:40px}
.stat-grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px}@media(max-width:600px){.stat-grid4{grid-template-columns:repeat(2,1fr);gap:6px}}

.locked #tab-add { display: none; }
.locked #tab-sync { display: none; }
</style>
</head>
<body class="theme-dark">
<nav>
  <div class="nav-safe"></div>
  <div style="display:flex;align-items:stretch;width:100%">
    <div class="nav-inner" style="flex:1;min-width:0">
      <div class="logo">Gijs' Concertlog</div>
      <button class="ntab on" id="tab-list"      onclick="goPage('list')">Concerten</button>
      <button class="ntab"    id="tab-add"       onclick="goPage('add')">+ Toevoegen</button>
      <button class="ntab"    id="tab-analytics" onclick="goPage('analytics')">Analytics</button>
      <button class="ntab"    id="tab-sync"      onclick="goPage('sync')">Admin</button>
    </div>
    <button id="tab-lock" onclick="unlocked?lock():tryUnlock()" title="Vergrendelen/ontgrendelen" style="background:none;border:none;font-size:18px;cursor:pointer;padding:0 14px;color:var(--muted);flex-shrink:0;border-left:1px solid var(--border)">&#128274;</button>
  </div>
</nav>
<div class="main" id="APP"></div>
<div class="toast" id="TOAST"></div>

function mkFD(){ return {artiest:'',locatie:'',plaats:'',datum:'',setlist:[],festival:'',soort:'Hoofdprogramma'}; }

function hashStr(s){
  // Simple djb2 hash — good enough for local access control
  var h=5381;
  for(var i=0;i<s.length;i++) h=((h<<5)+h)^s.charCodeAt(i);
  return (h>>>0).toString(36);
}

function tryUnlock(){
  if(!PASS_HASH){
    // Geen wachtwoord ingesteld — direct ontgrendelen
    unlocked=true;
    sessionStorage.setItem('giglog_unlocked','1');
    render(); return;
  }
  var pw=prompt('Wachtwoord:');
  if(pw===null) return;
  if(hashStr(pw)===PASS_HASH){
    unlocked=true;
    sessionStorage.setItem('giglog_unlocked','1');
    render(); toast('Ontgrendeld ✓','ok');
  } else {
    toast('Onjuist wachtwoord','err');
  }
}

function lock(){
  unlocked=false;
  sessionStorage.removeItem('giglog_unlocked');
  if(page==='add'||page==='sync') goPage('list');
  else render();
  toast('Vergrendeld','info');
}

function savePassword(){
  var el=document.getElementById('newPassIn');

  var pw=el.value.trim();
  if(!pw){ PASS_HASH=''; localStorage.removeItem('giglog_pass_hash'); toast('Wachtwoord verwijderd','info'); goPage('sync'); return; }
  PASS_HASH=hashStr(pw);
  localStorage.setItem('giglog_pass_hash',PASS_HASH);
  unlocked=true;
  sessionStorage.setItem('giglog_unlocked','1');
  toast('Wachtwoord opgeslagen','ok');
  goPage('sync');
}

function escH(s){ return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function toast(msg, type){
  var el = document.getElementById('TOAST');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' '+type : '');
  clearTimeout(el._t);
  el._t = setTimeout(function(){ el.className='toast'; }, 3000);
}

function setTheme(t){
  curTheme = t;
  document.body.className = 'theme-' + t;

  document.querySelectorAll('.tswatch').forEach(function(sw){
    sw.classList.toggle('active', sw.dataset.theme === t);
  });
}

// ── DB ────────────────────────────────────────────────────────────
function initDB(){
  try {
    var saved = localStorage.getItem('giglog_v4');
    if(saved){ DB = JSON.parse(saved); }
    else {
      var bin = atob(RAW_B64);
      var bytes = new Uint8Array(bin.length);
      for(var i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
      DB = JSON.parse(pako.inflate(bytes,{to:'string'}));
      persist();
    }
    if(GIST_ID) loadFromGist();
  } catch(e){ console.error('initDB',e); DB=[]; }
}

function persist(){ localStorage.setItem('giglog_v4', JSON.stringify(DB)); }

// ── GIST ──────────────────────────────────────────────────────────
async function loadFromGist(){
  if(!GIST_ID) return;
  gistStatus='syncing'; updateSyncBadge();
  try {
    var r = await fetch('https://api.github.com/gists/'+GIST_ID, {headers:{'Accept':'application/vnd.github+json'}});
    if(!r.ok) throw new Error('HTTP '+r.status);
    var gist = await r.json();
    var file = gist.files && gist.files[GIST_FILE];
    if(!file) throw new Error('Bestand niet gevonden');
    var data = JSON.parse(file.content);
    if(Array.isArray(data)){
      DB = data;
      persist();
      gistStatus = 'ok';
      render();
    } else {
      gistStatus = 'ok';
    }
    updateSyncBadge();
  } catch(e){ console.warn('Gist load:',e.message); gistStatus='err'; updateSyncBadge(); }
}

async function saveToGist(){
  if(!GIST_ID||!GIST_TOKEN){ toast('Voer eerst Gist ID en token in bij Admin','err'); return; }
  gistStatus='syncing'; updateSyncBadge();
  try {
    var body={files:{}}; body.files[GIST_FILE]={content:JSON.stringify(DB)};
    var r=await fetch('https://api.github.com/gists/'+GIST_ID,{
      method:'PATCH',
      headers:{'Authorization':'Bearer '+GIST_TOKEN,'Accept':'application/vnd.github+json','Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    if(!r.ok){ var e=await r.json(); throw new Error(e.message||'HTTP '+r.status); }
    gistStatus='ok'; updateSyncBadge(); toast('Opgeslagen naar Gist!','ok');
  } catch(e){ gistStatus='err'; updateSyncBadge(); toast('Gist fout: '+e.message,'err'); }
}

function updateSyncBadge(){
  var el = document.getElementById('syncBadge');
  if(!el) return;
  if(!GIST_ID){ el.className='sync-badge'; el.textContent='Geen Gist'; }
  else if(gistStatus==='ok'){ el.className='sync-badge sync-ok'; el.textContent='Gesynchroniseerd'; }
  else if(gistStatus==='syncing'){ el.className='sync-badge'; el.textContent='↻ Laden...'; }
  else { el.className='sync-badge sync-err'; el.textContent='Gist fout'; }
}

function afterMutate(){ persist(); if(GIST_ID&&GIST_TOKEN) saveToGist(); }

// ── SEARCH / FILTER ───────────────────────────────────────────────
function fuzzyMatch(q, t){
  if(!q) return true; if(!t) return false;
  var tl=t.toLowerCase(), ql=q.toLowerCase().trim();
  if(tl.includes(ql)) return true;
  return ql.split(/\s+/).filter(Boolean).every(function(w){ return tl.includes(w); });
}

function getFiltered(){
  return DB.filter(function(c){
    var q=srchQ.trim(), lq=fLocatie.trim();
    var mq=!q||[c.artiest,c.locatie,c.plaats,c.festival,c.soort].some(function(v){ return fuzzyMatch(q,v); });
    return mq && (!lq||fuzzyMatch(lq,c.locatie)) && (!fJaar||String(c.jaar)===fJaar)
           && (!fMaand||String(c.maand)===fMaand)
           && (!fSoort||c.soort===fSoort) && (!fPlaats||c.plaats===fPlaats);
  }).sort(function(a,b){ return b.datum>a.datum?1:-1; });
}

  var plaatsen = [...new Set(DB.map(function(c){return c.plaats;}).filter(Boolean))].sort();

function updateCards(){
  var filtered = getFiltered();
  var total = filtered.length;
  var pages = Math.max(1, Math.ceil(total/PER));
  if(curPage>pages) curPage=pages;
  var slice = filtered.slice((curPage-1)*PER, curPage*PER);

  var tc=document.getElementById('totalCount');
  var ri=document.getElementById('resultInfo');
  var cg=document.getElementById('cardGrid');
  var pd=document.getElementById('pagDiv');
  if(!cg) return;
  if(tc) tc.textContent = total.toLocaleString('nl')+' concerten';
  if(ri) ri.textContent = total+' resultaten \u00b7 pagina '+curPage+' van '+pages;
  if(total===0){
    cg.innerHTML='<div class="empty"><div style="font-size:36px;margin-bottom:10px">&#127928;</div><div class="emtitle">Geen resultaten</div></div>';
  } else {
    cg.innerHTML='';
    slice.forEach(function(con){ cg.appendChild(buildCard(con)); });
  }
  if(pd) pd.innerHTML = pages>1
    ? '<button class="btn b-sec b-sm"'+(curPage===1?' disabled':'')+' onclick="curPage=Math.max(1,curPage-1);updateCards()">&larr; Vorige</button>'
      +'<span class="pinfo">'+curPage+' / '+pages+'</span>'
      +'<button class="btn b-sec b-sm"'+(curPage===pages?' disabled':'')+' onclick="curPage=Math.min('+pages+',curPage+1);updateCards()">Volgende &rarr;</button>'
    : '';
}

function buildCard(con){
  var d = con.datum ? new Date(con.datum).toLocaleDateString('nl-NL',{day:'numeric',month:'short',year:'numeric'}) : '';
  var songs = con.setlist||[];
  var el = document.createElement('div');
  el.className = 'card';
  el.dataset.cid = con.id;
  el.addEventListener('click', function(){ openDetail(this.dataset.cid); });
  el.innerHTML = '<div class="ctop"><div class="cartist">'+escH(con.artiest)+'</div><div class="cdate">'+d+'</div></div>'
    +'<div class="cmeta">'
    +(con.locatie?'<span>&#128205; '+escH(con.locatie)+(con.plaats?', '+escH(con.plaats):'')+'</span>':(con.plaats?'<span>&#128205; '+escH(con.plaats)+'</span>':''))
    +(con.soort?' <span class="pill p-soort">'+escH(con.soort)+'</span>':'')
    +(con.festival?' <span class="pill p-fest">&#127894; '+escH(con.festival)+'</span>':'')
    +(songs.filter(function(x){return x!=='---';}).length?' <span class="pill p-sl">&#127925; '+songs.filter(function(x){return x!=='---';}).length+' nrs</span>':'')
    +'</div>';
  return el;
}

          .sort(function(a,b){ return a.artiest>b.artiest?1:-1; });

async function callAI(venue){
  var hint=document.getElementById('aiHint'), pEl=document.getElementById('fP');
  if(!pEl||pEl.value.trim()) return;
  if(hint) hint.textContent='AI zoekt locatie...';
  try{
    var r=await fetch(CAPI,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:80,
        messages:[{role:'user',content:'Venue: "'+venue+'". Reply ONLY JSON: {"plaats":"Amsterdam"}. Dutch city name. Unknown: {"plaats":""}.' }]})});
    var d=await r.json(); var txt=(d.content&&d.content[0]&&d.content[0].text)||'';
    var m=txt.match(/\{[^}]+\}/);
    if(m){ var loc=JSON.parse(m[0]); if(loc.plaats&&pEl&&!pEl.value.trim()){ pEl.value=loc.plaats; if(hint) hint.textContent='AI: '+loc.plaats; setTimeout(function(){ if(hint) hint.textContent=''; },3000); } }
  } catch(e){ if(hint) hint.textContent=''; }
}

function addSong(){
  var el=document.getElementById('newSong');
  if(!el||!el.value.trim()) return;
  syncFDFromForm();
  var val=el.value.trim();
  // '-' of '--' als invoer = encore-scheidingsteken
  if(val==='-'||val==='--'||/^encore$/i.test(val)){
    if(FD.setlist.length && FD.setlist[FD.setlist.length-1]!=='---'){
      FD.setlist.push('---');
    }
  } else {
    FD.setlist.push(val);
  }
  el.value=''; refreshSongArea();
}
function rmSong(i){ syncFDFromForm(); FD.setlist.splice(i,1); refreshSongArea(); }

function parseAndAddPaste(){
  var ta=document.getElementById('pasteArea'); if(!ta||!ta.value.trim()){ toast('Geen tekst','err'); return; }
  syncFDFromForm(); var added=0;
  ta.value.split('\n').forEach(function(line){
    line=line.trim(); if(!line) return;
    // Herken encore-scheidingstekens: "Encore", "Encore:", "---", "***"
    if(/^[-=*]{2,}$/.test(line) || /^encore\b/i.test(line) || /^e:/i.test(line)){
      if(FD.setlist.length && FD.setlist[FD.setlist.length-1]!=='---'){ FD.setlist.push('---'); }
      return;
    }
    // Strip nummering vooraan
    var cleaned=line.replace(/^[\d]+[\s]*[\.\-\)][\s]*/,'').trim();
    // Strip Setlist.fm artefacten
    if(/^play video$/i.test(cleaned)) return;
    // Regel die alleen haakjes-tekst is -> plak aan vorig nummer
    if(/^\(.*\)$/.test(cleaned)){
      if(FD.setlist.length && FD.setlist[FD.setlist.length-1]!=='---'){
        FD.setlist[FD.setlist.length-1] += ' ' + cleaned;
      }
      return;
    }
    if(cleaned){ FD.setlist.push(cleaned); added++; }
  });
  ta.value=''; refreshSongArea(); toast(added+' nummers toegevoegd!','ok');
}

  var songs=FD.setlist;

function buildAnalytics(){
  if(!DB.length) return '<div class="empty"><div style="font-size:36px;margin-bottom:10px">&#128202;</div><div class="emtitle">Geen data</div></div>';
  var total=DB.length;
  var uArt=new Set(DB.map(function(c){return c.artiest;})).size;
  var uPl=new Set(DB.map(function(c){return c.plaats;}).filter(Boolean)).size;
  var withSl=DB.filter(function(c){return c.setlist&&c.setlist.length;}).length;
  var SOORTEN=['Hoofdprogramma','Voorprogramma','Festivaloptreden','Theater/Comedy'];
  var soortColors={'Hoofdprogramma':'var(--accent)','Voorprogramma':'var(--accent3)','Festivaloptreden':'#ffa032','Theater/Comedy':'#a78bfa'};
  var ac={};DB.forEach(function(c){ac[c.artiest]=(ac[c.artiest]||0)+1;});
  var top10=Object.entries(ac).sort(function(a,b){return b[1]-a[1];}).slice(0,10);var maxA=top10[0]?top10[0][1]:1;
  var yc={};DB.forEach(function(c){if(c.jaar)yc[c.jaar]=(yc[c.jaar]||0)+1;});
  var yrs=Object.entries(yc).sort(function(a,b){return+a[0]-+b[0];});

  var pc={};DB.forEach(function(c){if(c.plaats)pc[c.plaats]=(pc[c.plaats]||0)+1;});

function yToggle(btn){btn.classList.toggle('ybtn-on');yApplyFilter();}
function yApplyFilter(){
  var active=[];
  document.querySelectorAll('#yfilters .ybtn-on').forEach(function(b){active.push(b.dataset.s);});
  // show/hide segments
  document.querySelectorAll('#yrBars .yseg').forEach(function(s){
    s.style.display=active.indexOf(s.dataset.s)>-1?'':'none';
  });
  // recalc totals and rescale segment heights within each bar
  var totals=[];
  document.querySelectorAll('#yrBars .ycol').forEach(function(col){
    var tot=0;
    var visSegs=[];
    col.querySelectorAll('.yseg').forEach(function(s){
      if(s.style.display!=='none'){
        var m=(s.getAttribute('title')||'').match(/: (\d+)$/);
        var n=m?parseInt(m[1]):0;
        tot+=n;
        visSegs.push({el:s,n:n});
      }
    });
    totals.push(tot);
    var cnt=col.querySelector('.ycnt'); if(cnt) cnt.textContent=tot||'';
    // Rescale segment % heights to fill the bar correctly
    visSegs.forEach(function(seg){
      seg.el.style.height=tot?Math.round(seg.n/tot*100)+'%':'0%';
    });
  });
  // Rescale bar heights relative to new max
  var maxTot=Math.max.apply(null,totals.concat([1]));
  document.querySelectorAll('#yrBars .ycol').forEach(function(col,i){
    var ybar=col.querySelector('.ybar');
    if(!ybar)return;
    var h=totals[i]?Math.round(totals[i]/maxTot*90)+6:4;
    ybar.style.height=h+'px';
  });
}
function mToggle(btn){btn.classList.toggle('ybtn-on');mApplyFilter();}

  var active=[];
  document.querySelectorAll('#mfilters .ybtn-on').forEach(function(b){active.push(b.dataset.s);});
  document.querySelectorAll('#mBars .yseg').forEach(function(s){
    s.style.display=active.indexOf(s.dataset.s)>-1?'':'none';
  });
  var totals=[];
  document.querySelectorAll('#mBars .ycol').forEach(function(col){
    var tot=0;
    var visSegs=[];
    col.querySelectorAll('.yseg').forEach(function(s){
      if(s.style.display!=='none'){
        var m=(s.getAttribute('title')||'').match(/: (\d+)$/);
        var n=m?parseInt(m[1]):0;
        tot+=n;
        visSegs.push({el:s,n:n});
      }
    });
    totals.push(tot);
    var cnt=col.querySelector('.ycnt'); if(cnt) cnt.textContent=tot||'';
    visSegs.forEach(function(seg){
      seg.el.style.height=tot?Math.round(seg.n/tot*100)+'%':'0%';
    });
  });
  var maxTot=Math.max.apply(null,totals.concat([1]));
  document.querySelectorAll('#mBars .ycol').forEach(function(col,i){
    var ybar=col.querySelector('.ybar');
    if(!ybar)return;
    var h=totals[i]?Math.round(totals[i]/maxTot*90)+6:4;
    ybar.style.height=h+'px';
  });
}

function saveGistConfig(){
  var id=document.getElementById('gistIdIn'), tok=document.getElementById('gistTokIn');
  if(!id||!tok) return;
  GIST_ID=id.value.trim(); GIST_TOKEN=tok.value.trim();
  localStorage.setItem('giglog_gist_id',GIST_ID); localStorage.setItem('giglog_gist_token',GIST_TOKEN);
  toast('Gist instellingen opgeslagen','ok');
  if(GIST_ID) loadFromGist();
  goPage('sync');
}

function saveAnthropicKey(){
  var el=document.getElementById('anthropicKeyIn');
  if(!el)return;
  ANTHROPIC_KEY=el.value.trim();
  localStorage.setItem('giglog_anthropic_key',ANTHROPIC_KEY);
  toast(ANTHROPIC_KEY?'API key opgeslagen!':'API key verwijderd','ok');
  goPage('sync');
}
function clearGistConfig(){
  GIST_ID=''; GIST_TOKEN='';
  localStorage.removeItem('giglog_gist_id'); localStorage.removeItem('giglog_gist_token');
  toast('Verbinding verwijderd','info'); goPage('sync');
}

function syncNow(){
  if(GIST_ID) loadFromGist();
  if(GIST_ID&&GIST_TOKEN) saveToGist();
}

function showFact(idx){
  var facts=window._allFacts;if(!facts||!facts.length)return;
  _factIdx=((idx%facts.length)+facts.length)%facts.length;
  var el=document.getElementById('factDisplay');
  var counter=document.getElementById('factCounter');
  if(el){el.style.opacity='0';setTimeout(function(){el.innerHTML=facts[_factIdx];el.style.opacity='1';},150);}
  if(counter)counter.textContent=(_factIdx+1)+' / '+facts.length;
}
function nextFact(){showFact(_factIdx+1);}
function prevFact(){showFact(_factIdx-1);}
function randomFact(){showFact(Math.floor(Math.random()*(window._allFacts||[]).length));}

    chatHistory.push({role:'assistant',content:reply});
    if(chatHistory.length>12)chatHistory=chatHistory.slice(-12);
  }catch(e){var t5=document.getElementById(thinkId);if(t5)t5.remove();chatAddMsg('bot','Fout: '+e.message);}
  if(btn)btn.disabled=false;
}

function chatAddMsg(role,text){
  var msgs=document.getElementById('chatMsgs');if(!msgs)return;
  var isUser=role==='user';
  var avatar=isUser?'<div class="chat-avatar chat-user-avatar">&#128100;</div>':'<div class="chat-avatar chat-bot-avatar">&#129302;</div>';
  var bubble='<div class="chat-bubble">'+escH(text).replace(/\n/g,'<br>')+'</div>';
  msgs.insertAdjacentHTML('beforeend','<div class="chat-msg '+role+'">'+(isUser?bubble+avatar:avatar+bubble)+'</div>');
  msgs.scrollTop=msgs.scrollHeight;
}

function buildDataSummary(){
  var lines=[];
  var dated=DB.filter(function(c){return c.datum;}).sort(function(a,b){return a.datum>b.datum?1:-1;});
  var firstYear=dated.length?dated[0].datum.slice(0,4):'?';
  var lastYear=dated.length?dated[dated.length-1].datum.slice(0,4):'?';
  lines.push('TOTAAL: '+DB.length+' concerten van '+firstYear+' t/m '+lastYear);
  var ac={};DB.forEach(function(c){ac[c.artiest]=(ac[c.artiest]||0)+1;});
  lines.push('\nTOP ARTIESTEN:');Object.entries(ac).sort(function(a,b){return b[1]-a[1];}).slice(0,30).forEach(function(e){lines.push('  '+e[0]+': '+e[1]);});
  var lc={};DB.forEach(function(c){if(c.locatie)lc[c.locatie]=(lc[c.locatie]||0)+1;});
  lines.push('\nTOP LOCATIES:');Object.entries(lc).sort(function(a,b){return b[1]-a[1];}).slice(0,30).forEach(function(e){lines.push('  '+e[0]+': '+e[1]);});
  var yc={};DB.forEach(function(c){if(c.jaar)yc[c.jaar]=(yc[c.jaar]||0)+1;});
  lines.push('\nPER JAAR:');Object.entries(yc).sort(function(a,b){return+a[0]-+b[0];}).forEach(function(e){lines.push('  '+e[0]+': '+e[1]);});
  lines.push('\nVOLLEDIGE LIJST (datum|artiest|locatie|plaats):');
  dated.forEach(function(c){lines.push(c.datum+'|'+c.artiest+'|'+(c.locatie||'')+'|'+(c.plaats||''));});
  var result=lines.join('\n');
  if(result.length>80000)result=result.slice(0,80000)+'\n[...ingekort]';
  return result;
}

function doExportXL(){
  if(!DB.length){ toast('Geen data','err'); return; }
  var rows=DB.map(function(c){ return {'Artiest':c.artiest,'Locatie':c.locatie,'Plaats':c.plaats,'Datum':c.datum,'Setlist':(c.setlist||[]).join('\n'),'Zaal/andere bijz.':c.festival,'Soort optreden':c.soort,'Maand':c.maand,'Jaar':c.jaar}; });
  var ws=XLSX.utils.json_to_sheet(rows); var wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Concerten');
  XLSX.writeFile(wb,'concertlog_'+new Date().toISOString().slice(0,10)+'.xlsx');
  toast('Excel gedownload!','ok');
}

function doExportCSV(){
  if(!DB.length){ toast('Geen data','err'); return; }
  var hdr=['Artiest','Locatie','Plaats','Datum','Setlist','Zaal/andere bijz.','Soort optreden','Maand','Jaar'];
  var rows=DB.map(function(c){ return [c.artiest,c.locatie,c.plaats,c.datum,(c.setlist||[]).join(' | '),c.festival,c.soort,c.maand,c.jaar].map(function(v){ return '"'+String(v||'').replace(/"/g,'""')+'"'; }); });
  var csv=[hdr.join(',')].concat(rows.map(function(r){ return r.join(','); })).join('\n');
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download='concertlog_'+new Date().toISOString().slice(0,10)+'.csv'; a.click();
  toast('CSV gedownload!','ok');
}

function doImport(input){
  var file=input.files[0]; if(!file) return;
  var r=new FileReader();
  r.onload=function(e){
    try{
      var wb=XLSX.read(e.target.result,{type:'array'});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var data=XLSX.utils.sheet_to_json(ws,{defval:''});
      DB = [];
      var added=0;
      var importBase=Date.now();
      data.forEach(function(row){
        var art=row['Artiest']||row['artiest']||''; if(!art) return;
        var d=row['Datum ']||row['Datum']||row['datum']||''; var ds='';
        if(d){ var dt=new Date(d); if(!isNaN(dt)) ds=dt.toISOString().slice(0,10); else ds=String(d).slice(0,10); }
        var sl=row['Setlist']||'';
        var songs=sl?String(sl).split(/[\n|]/).map(function(s){ return s.trim(); }).filter(Boolean):[];
        DB.push({id:String(importBase + added),artiest:String(art),
          locatie:String(row['Locatie']||row['locatie']||''),
          plaats:String(row['Plaats']||row['plaats']||''),
          datum:ds,setlist:songs,
          festival:String(row['Zaal/andere bijz.']||row['festival']||''),
          soort:String(row['Soort optreden']||row['soort']||'Hoofdprogramma'),
          maand:ds?parseInt(ds.slice(5,7)):0,jaar:ds?parseInt(ds.slice(0,4)):0});
        added++;
      });
      afterMutate(); toast(added+' concerten geimporteerd!','ok'); goPage('list');
    } catch(err){ toast('Import fout: '+err.message,'err'); }
  };
  r.readAsArrayBuffer(file);
}

function deleteAllConcerts(){
  if(!confirm('Weet je zeker dat je ALLE '+DB.length+' concerten wilt verwijderen?\n\nDit kan niet ongedaan worden gemaakt.')) return;
  if(!confirm('Laatste waarschuwing: '+DB.length+' concerten worden permanent verwijderd.')) return;
  DB=[]; afterMutate(); toast('Alle concerten verwijderd','err'); goPage('sync');
}
